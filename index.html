<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yuzifudai · Folio</title>
    <style>
      body{
        margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
        background:radial-gradient(900px 520px at 18% 8%, rgba(176, 140, 98, 0.18), transparent 62%),
          radial-gradient(1000px 650px at 85% 18%, rgba(108, 75, 42, 0.10), transparent 60%),
          linear-gradient(180deg, #fbf7f0, #f6f1e8);
        color:#231f1a;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;
      }
      .card{max-width:720px;width:100%;border:1px solid rgba(35,31,26,.14);border-radius:18px;padding:20px;background:rgba(255,255,255,.72);box-shadow:0 18px 60px rgba(35,31,26,.12)}
      h1{margin:0 0 8px;font-size:22px;font-family:Georgia,"Times New Roman",Times,serif}
      p{margin:0 0 14px;color:rgba(35,31,26,.66);line-height:1.55}
      .row{display:flex;gap:10px;flex-wrap:wrap}
      a{display:inline-block;padding:10px 14px;border-radius:999px;border:1px solid rgba(35,31,26,.14);text-decoration:none;color:#231f1a;background:rgba(255,255,255,.5)}
      a:hover{border-color:rgba(35,31,26,.26)}
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Choose language / 选择语言</h1>
      <p>If you’re not redirected automatically, pick one:</p>
      <div class="row">
        <a href="./en/">English</a>
        <a href="./zh/">中文</a>
      </div>
    </main>

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("preferred_locale");
          if (saved === "zh" || saved === "en") {
            location.replace("./" + saved + "/");
            return;
          }
        } catch (_) {}

        var lang = (navigator.language || "").toLowerCase();
        var target = lang.startsWith("zh") ? "zh" : "en";
        location.replace("./" + target + "/");
      })();
    </script>
  </body>
</html>
